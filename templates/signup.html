<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Flask AI App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-md p-8">
        <div class="flex flex-col items-center">
            <h1 class="text-2xl font-semibold text-gray-800 mb-2">Create a New Account</h1>
            <p class="text-gray-500 mb-6 text-center">Sign up to access your files</p>
            <form action="/signup" method="POST" class="w-full flex flex-col gap-4">
                <input type="text" name="email" placeholder="Email" required
                    class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-blue-400" />
                <input type="text" name="username" placeholder="Username" required
                    class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-blue-400" />
                <input type="password" name="password" placeholder="Password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring focus:border-blue-400" />
                <button type="submit" 
                    class="w-full py-2 bg-green-600 text-white font-medium rounded shadow hover:bg-green-700 transition">
                    Sign Up
                </button>
            </form>
            <a href="/" class="mt-4 text-blue-600 hover:underline">Already have an account? Log in</a>
        </div>
    </div>
    {% if message %}
    <script>
    alert("{{ message }}");
     </script>
    {% endif %}
</body>
</html>
