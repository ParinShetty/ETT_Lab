<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-md p-8">
        <div class="flex flex-col items-center">
            <img src="https://ssl.gstatic.com/docs/doclist/images/infinite_arrow_favicon_5.ico" alt="Google Drive Logo" class="w-12 h-12 mb-4" />
            <h1 class="text-2xl font-semibold text-gray-800 mb-6">Upload a File</h1>
            
            <div id="success-alert" style="display:none"
                 class="mb-4 bg-green-100 border border-green-300 text-green-800 px-4 py-2 rounded text-center">
                Upload successful!
            </div>
            <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data" class="w-full flex flex-col items-center space-y-4">
                <input type="file" name="file" required
                       class="block w-full text-gray-700 border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
                <button type="submit"
                        class="w-full py-2 bg-blue-600 text-white font-medium rounded shadow hover:bg-blue-700 transition">
                    Upload
                </button>
            </form>
            <a href="/main"
               class="mt-6 text-blue-600 hover:underline transition">
                &larr; Back to Home
            </a>
        </div>
    </div>
    <script>
    document.getElementById('uploadForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const form = e.target;
        const formData = new FormData(form);

        try {
            const response = await fetch(form.action, {
                method: 'POST',
                body: formData
            });
            if (response.ok) {
                document.getElementById('success-alert').style.display = '';
                form.reset();
            } else {
                alert('Upload failed.');
            }
        } catch (err) {
            alert('Upload failed.');
        }
    });
    </script>
</body>
</html>
